name: 'Inbound HTTP Logger CI'

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']
        rails-version: ['7.2.0', '8.0.1']

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Run RuboCop
        run: |
          bundle exec rake rubocop

      - name: Run SQLite tests
        run: |
          bundle exec rake test

      - name: Run database adapter tests
        run: |
          bundle exec ruby -Itest test/test_database_adapters.rb

      - name: Test all individual test files
        run: |
          echo "🧪 Running individual test files to ensure comprehensive coverage..."
          for test_file in test/**/*test*.rb; do
            if [[ "$test_file" != *"test_helper.rb"* ]]; then
              echo "Running $test_file..."
              bundle exec ruby -Itest "$test_file" || exit 1
            fi
          done
          echo "✅ All individual test files passed"

      - name: Verify test coverage
        run: |
          echo "📊 Verifying test coverage..."
          test_files=$(find test -name "*test*.rb" ! -name "test_helper.rb" | wc -l)
          echo "Found $test_files test files"
          if [ "$test_files" -lt 6 ]; then
            echo "❌ Expected at least 6 test files, found $test_files"
            exit 1
          fi
          echo "✅ Test file count looks good ($test_files files)"

  postgresql-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ruby-version: ['3.2', '3.3', '3.4']
        rails-version: ['7.2.0', '8.0.1']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: inbound_http_logger_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby-version }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby-version }}
          bundler-cache: true

      - name: Set up PostgreSQL environment
        run: |
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/inbound_http_logger_test" >> $GITHUB_ENV
          echo "INBOUND_HTTP_LOGGER_TEST_DATABASE_URL=postgresql://postgres:postgres@localhost:5432/inbound_http_logger_test" >> $GITHUB_ENV

      - name: Test PostgreSQL connection and adapters
        run: |
          ./bin/test-postgresql

      - name: Run database adapter tests with PostgreSQL
        run: |
          bundle exec ruby -Itest test/test_database_adapters.rb

  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Build gem
        run: |
          bundle exec rake build

      - name: Upload gem artifact
        uses: actions/upload-artifact@v4
        with:
          name: inbound-http-logger-gem
          path: pkg/*.gem
          retention-days: 7

  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Validate gemspec
        run: |
          bundle exec gem build inbound_http_logger.gemspec
          bundle exec gem specification *.gem

      - name: Check for TODO/FIXME comments
        run: |
          if grep -r "TODO\|FIXME" lib/ test/ --exclude-dir=.git; then
            echo "⚠️  Found TODO/FIXME comments. Consider addressing them."
            exit 1
          else
            echo "✅ No TODO/FIXME comments found"
          fi
        continue-on-error: true

  security:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Run bundle audit
        run: |
          echo "Installing bundler-audit..."
          gem install bundler-audit
          bundle-audit check --update
        continue-on-error: true

  summary:
    runs-on: ubuntu-latest
    needs: [test, build, quality, security]
    if: always()
    steps:
      - name: Check job results
        run: |
          echo "## Job Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Quality | ${{ needs.quality.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security | ${{ needs.security.result }} |" >> $GITHUB_STEP_SUMMARY

          if [[ "${{ needs.test.result }}" == "failure" || "${{ needs.build.result }}" == "failure" ]]; then
            echo "❌ Critical jobs failed"
            exit 1
          elif [[ "${{ needs.quality.result }}" == "failure" || "${{ needs.security.result }}" == "failure" ]]; then
            echo "⚠️  Quality or security checks failed, but build is functional"
            exit 0
          else
            echo "✅ All checks passed"
            exit 0
          fi
